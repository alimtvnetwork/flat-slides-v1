name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint

      - name: Vitest
        run: bunx vitest run --reporter=dot
